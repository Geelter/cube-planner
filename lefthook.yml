pre-commit:
  parallel: true
  commands:
    oxlint:
      root: frontend/
      glob: "*.{ts,tsx}"
      run: pnpm exec oxlint {staged_files}
    oxfmt:
      root: frontend/
      glob: "*.{ts,tsx,css,json}"
      run: pnpm exec oxfmt {staged_files} && git add {staged_files}
    gofumpt:
      glob: "backend/**/*.go"
      run: cd backend && go run mvdan.cc/gofumpt@latest -l -w . && git add -u
