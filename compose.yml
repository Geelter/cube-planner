# LOCAL DEVELOPMENT ONLY. Credentials are intentionally hardcoded for
# convenience and MUST NOT be reused in any shared or production environment.
name: cube-planner
services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: cube
      POSTGRES_PASSWORD: cube
      POSTGRES_DB: cube
    ports:
      - "5432:5432"
    volumes:
      # postgres:18+ mounts all of /var/lib/postgresql (PGDATA sits in a
      # versioned subdir so future pg_upgrade --link migrations work)
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cube -d cube"]
      interval: 5s
      timeout: 5s
      retries: 5
  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025" # SMTP (backend -> mailpit)
      - "8025:8025" # Web UI: http://localhost:8025
volumes:
  pgdata:
