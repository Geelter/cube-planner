services:
  web:
    image: ghcr.io/${GHCR_OWNER}/cube-planner-web:latest
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - caddy_data:/data
    depends_on:
      - api

  api:
    image: ghcr.io/${GHCR_OWNER}/cube-planner-api:latest
    restart: unless-stopped
    environment:
      ENV: prod
      DATABASE_URL: postgres://cube:${POSTGRES_PASSWORD}@postgres:5432/cube?sslmode=disable
      BASE_URL: https://${DOMAIN}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: cube
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: cube
    volumes:
      # postgres:18+ mounts all of /var/lib/postgresql (PGDATA sits in a
      # versioned subdir so future pg_upgrade --link migrations work)
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cube"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  caddy_data:
  pgdata:
