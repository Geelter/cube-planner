version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      npm-minor-patch:
        update-types: [minor, patch]

  - package-ecosystem: gomod
    directory: /backend
    schedule:
      interval: weekly
    groups:
      go-minor-patch:
        update-types: [minor, patch]

  - package-ecosystem: docker
    directories: [/backend, /frontend]
    schedule:
      interval: weekly
