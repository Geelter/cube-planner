version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 3
    groups:
      actions:
        patterns: ["*"]

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 3  # stays above pnpm's minimumReleaseAge (24h):
      # proposing younger versions makes pnpm's strict age check abort
      # Dependabot's whole npm run
    groups:
      npm-minor-patch:
        update-types: [minor, patch]
    ignore:
      # openapi-typescript does not support TypeScript >5.x yet.
      - dependency-name: typescript
        update-types: ["version-update:semver-major"]

  - package-ecosystem: gomod
    directory: /backend
    schedule:
      interval: weekly
    cooldown:
      default-days: 3
    groups:
      go-minor-patch:
        update-types: [minor, patch]

  - package-ecosystem: docker
    directories: [/backend, /frontend]
    schedule:
      interval: weekly
    cooldown:
      default-days: 3
    ignore:
      # Node majors move with .nvmrc, not Dependabot; node:25+ images
      # also dropped corepack, which the frontend Dockerfile needs.
      - dependency-name: node
        update-types: ["version-update:semver-major"]
