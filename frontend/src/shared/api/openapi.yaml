components:
  schemas:
    ErrorDetail:
      additionalProperties: false
      properties:
        location:
          description: Where the error occurred, e.g. 'body.items[3].tags' or 'path.thing-id'
          type: string
        message:
          description: Error message text
          type: string
        value:
          description: The value at the given location
      type: object
    ErrorModel:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/ErrorModel.json
          format: uri
          readOnly: true
          type: string
        detail:
          description: A human-readable explanation specific to this occurrence of the problem.
          examples:
            - Property foo is required but is missing.
          type: string
        errors:
          description: Optional list of individual error details
          items:
            $ref: "#/components/schemas/ErrorDetail"
          type:
            - array
            - "null"
        instance:
          description: A URI reference that identifies the specific occurrence of the problem.
          examples:
            - https://example.com/error-log/abc123
          format: uri
          type: string
        status:
          description: HTTP status code
          examples:
            - 400
          format: int64
          type: integer
        title:
          description: A short, human-readable summary of the problem type. This value should not change between occurrences of the error.
          examples:
            - Bad Request
          type: string
        type:
          default: about:blank
          description: A URI reference to human-readable documentation for the error.
          examples:
            - https://example.com/errors/example
          format: uri
          type: string
      type: object
    ForgotPasswordInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/ForgotPasswordInputBody.json
          format: uri
          readOnly: true
          type: string
        email:
          format: email
          type: string
      required:
        - email
      type: object
    HealthOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/HealthOutputBody.json
          format: uri
          readOnly: true
          type: string
        status:
          examples:
            - ok
          type: string
      required:
        - status
      type: object
    LoginInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/LoginInputBody.json
          format: uri
          readOnly: true
          type: string
        email:
          format: email
          type: string
        password:
          minLength: 1
          type: string
      required:
        - email
        - password
      type: object
    RegisterInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/RegisterInputBody.json
          format: uri
          readOnly: true
          type: string
        displayName:
          maxLength: 50
          minLength: 1
          type: string
        email:
          format: email
          maxLength: 254
          type: string
        password:
          maxLength: 200
          minLength: 8
          type: string
      required:
        - email
        - displayName
        - password
      type: object
    ResetPasswordInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/ResetPasswordInputBody.json
          format: uri
          readOnly: true
          type: string
        newPassword:
          maxLength: 200
          minLength: 8
          type: string
        token:
          minLength: 1
          type: string
      required:
        - token
        - newPassword
      type: object
    UserBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/UserBody.json
          format: uri
          readOnly: true
          type: string
        displayName:
          type: string
        email:
          type: string
        id:
          type: string
        providers:
          items:
            type: string
          type:
            - array
            - "null"
      required:
        - id
        - email
        - displayName
        - providers
      type: object
    VerifyEmailInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/VerifyEmailInputBody.json
          format: uri
          readOnly: true
          type: string
        token:
          minLength: 1
          type: string
      required:
        - token
      type: object
info:
  title: Cube Planner API
  version: 0.1.0
openapi: 3.1.0
paths:
  /api/auth/forgot-password:
    post:
      operationId: forgot-password
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordInputBody"
        required: true
      responses:
        "204":
          description: No Content
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Request a password reset email
      tags:
        - auth
  /api/auth/login:
    post:
      operationId: login
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInputBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserBody"
          description: OK
          headers:
            Set-Cookie:
              schema:
                type: string
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Log in with email and password
      tags:
        - auth
  /api/auth/logout:
    post:
      operationId: logout
      parameters:
        - in: cookie
          name: cp_session
          schema:
            type: string
      responses:
        "204":
          description: No Content
          headers:
            Set-Cookie:
              schema:
                type: string
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Log out
      tags:
        - auth
  /api/auth/register:
    post:
      operationId: register
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInputBody"
        required: true
      responses:
        "204":
          description: No Content
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Register with email and password
      tags:
        - auth
  /api/auth/reset-password:
    post:
      operationId: reset-password
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordInputBody"
        required: true
      responses:
        "204":
          description: No Content
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Reset password with a token
      tags:
        - auth
  /api/auth/verify-email:
    post:
      operationId: verify-email
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyEmailInputBody"
        required: true
      responses:
        "204":
          description: No Content
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Verify email address with a token
      tags:
        - auth
  /api/healthz:
    get:
      operationId: healthz
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Health check
      tags:
        - meta
  /api/me:
    get:
      operationId: me
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Current user
      tags:
        - auth

