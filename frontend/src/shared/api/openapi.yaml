          format: date-time
          type: string
        status:
          enum:
            - pending_payment
            - paid
            - waitlisted
            - cancelled
            - refund_requested
            - refunded
            - expired
          type: string
        waitlistPos:
          format: int64
          type: integer
      required:
        - id
        - status
      type: object
    ResetPasswordInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/ResetPasswordInputBody.json
          format: uri
          readOnly: true
          type: string
        newPassword:
          maxLength: 200
          minLength: 8
          type: string
        token:
          minLength: 1
          type: string
      required:
        - token
        - newPassword
      type: object
    ResolveImportInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/ResolveImportInputBody.json
          format: uri
          readOnly: true
          type: string
        text:
          maxLength: 65536
          minLength: 1
          type: string
      required:
        - text
      type: object
    ResolveImportOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/ResolveImportOutputBody.json
          format: uri
          readOnly: true
          type: string
        lines:
          items:
            $ref: "#/components/schemas/ImportResolveLine"
          type:
            - array
            - "null"
      required:
        - lines
      type: object
    SearchCardsOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/SearchCardsOutputBody.json
          format: uri
          readOnly: true
          type: string
        cards:
          items:
            $ref: "#/components/schemas/CardDetail"
          type:
            - array
            - "null"
        total:
          format: int64
          type: integer
      required:
        - cards
        - total
      type: object
    SetCollectionQuantityInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/SetCollectionQuantityInputBody.json
          format: uri
          readOnly: true
          type: string
        quantity:
          description: 0 deletes the row
          format: int32
          maximum: 999
          minimum: 0
          type: integer
      required:
        - quantity
      type: object
    SetEventCubesInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/SetEventCubesInputBody.json
          format: uri
          readOnly: true
          type: string
        cubes:
          items:
            $ref: "#/components/schemas/EventCubeLink"
          maxItems: 20
          type:
            - array
            - "null"
      required:
        - cubes
      type: object
    UpdateCubeInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/UpdateCubeInputBody.json
          format: uri
          readOnly: true
          type: string
        description:
          maxLength: 2000
          type: string
        name:
          maxLength: 100
          minLength: 1
          type: string
        visibility:
          enum:
            - public
            - private
          type: string
      type: object
    UpdateEventInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/UpdateEventInputBody.json
          format: uri
          readOnly: true
          type: string
        currency:
          pattern: ^[a-z]{3}$
          type: string
        description:
          maxLength: 5000
          type: string
        feeCents:
          format: int32
          maximum: 10000000
          minimum: 0
          type: integer
        location:
          maxLength: 200
          type: string
        maxParticipants:
          format: int32
          maximum: 1000
          minimum: 1
          type: integer
        name:
          maxLength: 200
          minLength: 1
          type: string
        refundDeadline:
          format: date-time
          type: string
        startsAt:
          format: date-time
          type: string
      type: object
    UserBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/UserBody.json
          format: uri
          readOnly: true
          type: string
        displayName:
          type: string
        email:
          type: string
        id:
          type: string
        providers:
          items:
            type: string
          type:
            - array
            - "null"
        role:
          enum:
            - user
            - admin
          type: string
      required:
        - id
        - email
        - displayName
        - providers
        - role
      type: object
    VerifyEmailInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/VerifyEmailInputBody.json
          format: uri
          readOnly: true
          type: string
        token:
          minLength: 1
          type: string
      required:
        - token
      type: object
    WantlistEntry:
      additionalProperties: false
      properties:
        cubeQuantity:
          format: int32
          type: integer
        imageNormal:
          type:
            - string
            - "null"
        imageSmall:
          type:
            - string
            - "null"
        manaCost:
          type: string
        missingQuantity:
          format: int32
          type: integer
        name:
          type: string
        oracleId:
          type: string
        ownedQuantity:
          format: int32
          type: integer
        scryfallId:
          description: The cube's chosen printing
          type: string
      required:
        - oracleId
        - scryfallId
        - name
        - manaCost
        - imageSmall
        - imageNormal
        - missingQuantity
        - cubeQuantity
        - ownedQuantity
      type: object
info:
  title: Cube Planner API
  version: 0.1.0
openapi: 3.1.0
paths:
  /api/auth/forgot-password:
    post:
      operationId: forgot-password
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordInputBody"
        required: true
      responses:
        "204":
          description: No Content
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Request a password reset email
      tags:
        - auth
  /api/auth/login:
    post:
      operationId: login
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInputBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserBody"
          description: OK
          headers:
            Set-Cookie:
              schema:
                type: string
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Log in with email and password
      tags:
        - auth
  /api/auth/logout:
    post:
      operationId: logout
      parameters:
        - in: cookie
          name: cp_session
          schema:
            type: string
      responses:
        "204":
          description: No Content
          headers:
            Set-Cookie:
              schema:
                type: string
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Log out
      tags:
        - auth
  /api/auth/register:
    post:
      operationId: register
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInputBody"
        required: true
      responses:
        "204":
          description: No Content
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Register with email and password
      tags:
        - auth
  /api/auth/reset-password:
    post:
      operationId: reset-password
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordInputBody"
        required: true
      responses:
        "204":
          description: No Content
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Reset password with a token
      tags:
        - auth
  /api/auth/verify-email:
    post:
      operationId: verify-email
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyEmailInputBody"
        required: true
      responses:
        "204":
          description: No Content
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Verify email address with a token
      tags:
        - auth
  /api/cards/autocomplete:
    get:
      description: "Typo-tolerant name search. Oracle-level: one entry per card with a representative printing."
      operationId: autocompleteCards
      parameters:
        - description: Card name, fuzzy
          explode: false
          in: query
          name: q
          required: true
          schema:
            description: Card name, fuzzy
            maxLength: 100
            minLength: 2
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutocompleteCardsOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Card name autocomplete
      tags:
        - cards
  /api/cards/search:
    get:
      operationId: searchCards
      parameters:
        - description: Fuzzy name filter
          explode: false
          in: query
          name: name
          schema:
            description: Fuzzy name filter
            maxLength: 100
            type: string
        - description: Color identity ⊆ selection; C = include colorless-only
          explode: false
          in: query
          name: colors
          schema:
            description: Color identity ⊆ selection; C = include colorless-only
            items:
              enum:
                - W
                - U
                - B
                - R
                - G
                - C
              type: string
            type:
              - array
              - "null"
        - description: Type line substring
          explode: false
          in: query
          name: type
          schema:
            description: Type line substring
            maxLength: 100
            type: string
        - description: Lower CMC bound (0 = none)
          explode: false
          in: query
          name: cmcMin
          schema:
            default: 0
            description: Lower CMC bound (0 = none)
            format: double
            minimum: 0
            type: number
        - description: Upper CMC bound (-1 = none)
          explode: false
          in: query
          name: cmcMax
          schema:
            default: -1
            description: Upper CMC bound (-1 = none)
            format: double
            minimum: -1
            type: number
        - explode: false
          in: query
          name: rarity
          schema:
            enum:
              - common
              - uncommon
              - rare
              - mythic
              - special
              - bonus
            type: string
        - description: Set code
          explode: false
          in: query
          name: set
          schema:
            description: Set code
            maxLength: 10
            type: string
        - explode: false
          in: query
          name: limit
          schema:
            default: 20
            format: int32
            maximum: 100
            minimum: 1
            type: integer
        - explode: false
          in: query
          name: offset
          schema:
            default: 0
            format: int32
            minimum: 0
            type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchCardsOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Search cards with filters
      tags:
        - cards
  /api/cards/{oracleId}/printings:
    get:
      operationId: cardPrintings
      parameters:
        - in: path
          name: oracleId
          required: true
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CardPrintingsOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: All printings of an oracle card, newest first
      tags:
        - cards
  /api/collection:
    get:
      operationId: getCollection
      parameters:
        - description: Name filter (substring, case-insensitive)
          explode: false
          in: query
          name: search
          schema:
            description: Name filter (substring, case-insensitive)
            maxLength: 100
            type: string
        - explode: false
          in: query
          name: limit
          schema:
            default: 50
            format: int32
            maximum: 100
            minimum: 1
            type: integer
        - explode: false
          in: query
          name: offset
          schema:
            default: 0
            format: int32
            minimum: 0
            type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetCollectionOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: The session user's collection
      tags:
        - collection
  /api/collection/cards/{scryfallId}:
    put:
      operationId: setCollectionQuantity
      parameters:
        - in: path
          name: scryfallId
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetCollectionQuantityInputBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CollectionItemOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Set the owned quantity of a printing (0 deletes)
      tags:
        - collection
  /api/collection/cards/{scryfallId}/change-printing:
    post:
      operationId: changeCollectionPrinting
      parameters:
        - in: path
          name: scryfallId
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePrintingInputBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CollectionItemOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Re-key an owned printing to another printing of the same card
      tags:
        - collection
  /api/collection/import:
    post:
      operationId: importCollectionItems
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImportItemsInputBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportItemsOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Add quantities onto the collection (bulk import commit)
      tags:
        - collection
  /api/collection/import/resolve:
    post:
      operationId: resolveCollectionImport
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResolveImportInputBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResolveImportOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Resolve a pasted card list (pure read, nothing is written)
      tags:
        - collection
  /api/cubes:
    get:
      operationId: listCubes
      parameters:
        - description: Fuzzy name filter (min 2 chars to take effect)
          explode: false
          in: query
          name: q
          schema:
            description: Fuzzy name filter (min 2 chars to take effect)
            maxLength: 100
            type: string
        - explode: false
          in: query
          name: limit
          schema:
            default: 20
            format: int32
            maximum: 100
            minimum: 1
            type: integer
        - explode: false
          in: query
          name: offset
          schema:
            default: 0
            format: int32
            minimum: 0
            type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListCubesOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Browse public cubes
      tags:
        - cubes
    post:
      operationId: createCube
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCubeInputBody"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CubeDetail"
          description: Created
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Create a cube
      tags:
        - cubes
  /api/cubes/{cubeId}:
    delete:
      operationId: deleteCube
      parameters:
        - in: path
          name: cubeId
          required: true
          schema:
            type: string
      responses:
        "204":
          description: No Content
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Delete a cube
      tags:
        - cubes
    get:
      operationId: getCube
      parameters:
        - in: path
          name: cubeId
          required: true
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CubeDetail"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Cube metadata
      tags:
        - cubes
    patch:
      operationId: updateCube
      parameters:
        - in: path
          name: cubeId
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCubeInputBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CubeDetail"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Update cube metadata
      tags:
        - cubes
  /api/cubes/{cubeId}/cards:
    get:
      operationId: getCubeCards
      parameters:
        - in: path
          name: cubeId
          required: true
          schema:
            type: string
        - description: -1 = current; otherwise a historical version to reconstruct
          explode: false
          in: query
          name: atVersion
          schema:
            default: -1
            description: -1 = current; otherwise a historical version to reconstruct
            format: int32
            minimum: -1
            type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetCubeCardsOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Cube card list, current or at a historical version
      tags:
        - cubes
  /api/cubes/{cubeId}/changes:
    get:
      operationId: listCubeChanges
      parameters:
        - in: path
          name: cubeId
          required: true
          schema:
            type: string
        - explode: false
          in: query
          name: limit
          schema:
            default: 20
            format: int32
            maximum: 100
            minimum: 1
            type: integer
        - explode: false
          in: query
          name: offset
          schema:
            default: 0
            format: int32
            minimum: 0
            type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListCubeChangesOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Changelog, newest first
      tags:
        - cubes
    post:
      operationId: commitCubeChange
      parameters:
        - in: path
          name: cubeId
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommitCubeChangeInputBody"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommitCubeChangeOutputBody"
          description: Created
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Commit a batched diff as one changelog entry
      tags:
        - cubes
  /api/cubes/{cubeId}/wantlist:
    get:
      operationId: getCubeWantlist
      parameters:
        - in: path
          name: cubeId
          required: true
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetWantlistOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Cards in the cube missing from the caller's collection
      tags:
        - collection
  /api/events:
    get:
      operationId: listEvents
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListEventsOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: All visible events (admins also see drafts)
      tags:
        - events
    post:
      operationId: createEvent
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEventInputBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventDetailBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Create a draft event (organizer)
      tags:
        - events
  /api/events/{eventId}:
    get:
      operationId: getEvent
      parameters:
        - in: path
          name: eventId
          required: true
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventDetailBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Event detail with cubes, attendees, and the caller's registration
      tags:
        - events
    patch:
      operationId: updateEvent
      parameters:
        - in: path
          name: eventId
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateEventInputBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventDetailBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Edit an event (field whitelist depends on lifecycle)
      tags:
        - events
  /api/events/{eventId}/cancel:
    post:
      operationId: cancelEvent
      parameters:
