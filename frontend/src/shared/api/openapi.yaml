components:
  schemas:
    AutocompleteCardsOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/AutocompleteCardsOutputBody.json
          format: uri
          readOnly: true
          type: string
        cards:
          items:
            $ref: "#/components/schemas/CardSummary"
          type:
            - array
            - "null"
      required:
        - cards
      type: object
    CardDetail:
      additionalProperties: false
      properties:
        backImageNormal:
          type:
            - string
            - "null"
        cmc:
          format: double
          type: number
        collectorNumber:
          type: string
        colorIdentity:
          items:
            type: string
          type:
            - array
            - "null"
        colors:
          items:
            type: string
          type:
            - array
            - "null"
        imageNormal:
          type:
            - string
            - "null"
        imageSmall:
          type:
            - string
            - "null"
        manaCost:
          type: string
        name:
          type: string
        oracleId:
          type: string
        oracleText:
          type: string
        promo:
          type: boolean
        rarity:
          type: string
        releasedAt:
          description: YYYY-MM-DD
          type: string
        scryfallId:
          type: string
        setCode:
          type: string
        setName:
          type: string
        typeLine:
          type: string
      required:
        - scryfallId
        - oracleId
        - name
        - manaCost
        - typeLine
        - oracleText
        - setCode
        - setName
        - collectorNumber
        - rarity
        - releasedAt
        - cmc
        - colors
        - colorIdentity
        - promo
        - imageSmall
        - imageNormal
        - backImageNormal
      type: object
    CardPrintingsOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/CardPrintingsOutputBody.json
          format: uri
          readOnly: true
          type: string
        printings:
          items:
            $ref: "#/components/schemas/CardDetail"
          type:
            - array
            - "null"
      required:
        - printings
      type: object
    CardSummary:
      additionalProperties: false
      properties:
        imageSmall:
          type:
            - string
            - "null"
        manaCost:
          type: string
        name:
          type: string
        oracleId:
          type: string
        scryfallId:
          description: Representative printing
          type: string
        typeLine:
          type: string
      required:
        - scryfallId
        - oracleId
        - name
        - manaCost
        - typeLine
        - imageSmall
      type: object
    ChangelogEntry:
      additionalProperties: false
      properties:
        adds:
          items:
            $ref: "#/components/schemas/ChangelogItem"
          type:
            - array
            - "null"
        authorName:
          type: string
        createdAt:
          format: date-time
          type: string
        id:
          type: string
        note:
          type: string
        removes:
          items:
            $ref: "#/components/schemas/ChangelogItem"
          type:
            - array
            - "null"
        version:
          format: int32
          type: integer
      required:
        - id
        - version
        - authorName
        - note
        - createdAt
        - adds
        - removes
      type: object
    ChangelogItem:
      additionalProperties: false
      properties:
        name:
          type: string
        oracleId:
          type: string
        quantity:
          format: int32
          type: integer
      required:
        - oracleId
        - name
        - quantity
      type: object
    CommitCubeChangeInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/CommitCubeChangeInputBody.json
          format: uri
          readOnly: true
          type: string
        adds:
          items:
            $ref: "#/components/schemas/CubeChangeAdd"
          maxItems: 1000
          type:
            - array
            - "null"
        expectedVersion:
          format: int32
          minimum: 0
          type: integer
        note:
          maxLength: 500
          type: string
        removes:
          items:
            $ref: "#/components/schemas/CubeChangeRemove"
          maxItems: 1000
          type:
            - array
            - "null"
      required:
        - expectedVersion
      type: object
    CommitCubeChangeOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/CommitCubeChangeOutputBody.json
          format: uri
          readOnly: true
          type: string
        change:
          $ref: "#/components/schemas/ChangelogEntry"
        version:
          format: int32
          type: integer
      required:
        - change
        - version
      type: object
    CreateCubeInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/CreateCubeInputBody.json
          format: uri
          readOnly: true
          type: string
        description:
          maxLength: 2000
          type: string
        name:
          maxLength: 100
          minLength: 1
          type: string
        visibility:
          enum:
            - public
            - private
          type: string
      required:
        - name
        - visibility
      type: object
    CubeCardEntry:
      additionalProperties: false
      properties:
        cmc:
          format: double
          type: number
        colorIdentity:
          items:
            type: string
          type:
            - array
            - "null"
        colors:
          items:
            type: string
          type:
            - array
            - "null"
        imageNormal:
          type:
            - string
            - "null"
        imageSmall:
          type:
            - string
            - "null"
        manaCost:
          type: string
        name:
          type: string
        oracleId:
          type: string
        quantity:
          format: int32
          type: integer
        rarity:
          type: string
        scryfallId:
          type: string
        typeLine:
          type: string
      required:
        - scryfallId
        - oracleId
        - name
        - manaCost
        - typeLine
        - cmc
        - colors
        - colorIdentity
        - rarity
        - imageSmall
        - imageNormal
        - quantity
      type: object
    CubeChangeAdd:
      additionalProperties: false
      properties:
        quantity:
          format: int32
          maximum: 99
          minimum: 1
          type: integer
        scryfallId:
          type: string
      required:
        - scryfallId
        - quantity
      type: object
    CubeChangeRemove:
      additionalProperties: false
      properties:
        oracleId:
          type: string
        quantity:
          format: int32
          maximum: 99
          minimum: 1
          type: integer
      required:
        - oracleId
        - quantity
      type: object
    CubeDetail:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/CubeDetail.json
          format: uri
          readOnly: true
          type: string
        cardCount:
          format: int64
          type: integer
        createdAt:
          format: date-time
          type: string
        description:
          type: string
        id:
          type: string
        name:
          type: string
        ownerId:
          type: string
        ownerName:
          type: string
        updatedAt:
          format: date-time
          type: string
        version:
          description: Optimistic-concurrency token for commits
          format: int32
          type: integer
        visibility:
          enum:
            - public
            - private
          type: string
      required:
        - id
        - name
        - description
        - ownerId
        - ownerName
        - cardCount
        - visibility
        - version
        - createdAt
        - updatedAt
      type: object
    CubeSummary:
      additionalProperties: false
      properties:
        cardCount:
          description: Sum of quantities
          format: int64
          type: integer
        description:
          type: string
        id:
          type: string
        name:
          type: string
        ownerName:
          type: string
        updatedAt:
          format: date-time
          type: string
        visibility:
          enum:
            - public
            - private
          type: string
      required:
        - id
        - name
        - description
        - ownerName
        - cardCount
        - visibility
        - updatedAt
      type: object
    ErrorDetail:
      additionalProperties: false
      properties:
        location:
          description: Where the error occurred, e.g. 'body.items[3].tags' or 'path.thing-id'
          type: string
        message:
          description: Error message text
          type: string
        value:
          description: The value at the given location
      type: object
    ErrorModel:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/ErrorModel.json
          format: uri
          readOnly: true
          type: string
        detail:
          description: A human-readable explanation specific to this occurrence of the problem.
          examples:
            - Property foo is required but is missing.
          type: string
        errors:
          description: Optional list of individual error details
          items:
            $ref: "#/components/schemas/ErrorDetail"
          type:
            - array
            - "null"
        instance:
          description: A URI reference that identifies the specific occurrence of the problem.
          examples:
            - https://example.com/error-log/abc123
          format: uri
          type: string
        status:
          description: HTTP status code
          examples:
            - 400
          format: int64
          type: integer
        title:
          description: A short, human-readable summary of the problem type. This value should not change between occurrences of the error.
          examples:
            - Bad Request
          type: string
        type:
          default: about:blank
          description: A URI reference to human-readable documentation for the error.
          examples:
            - https://example.com/errors/example
          format: uri
          type: string
      type: object
    ForgotPasswordInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/ForgotPasswordInputBody.json
          format: uri
          readOnly: true
          type: string
        email:
          format: email
          type: string
      required:
        - email
      type: object
    GetCubeCardsOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/GetCubeCardsOutputBody.json
          format: uri
          readOnly: true
          type: string
        cards:
          items:
            $ref: "#/components/schemas/CubeCardEntry"
          type:
            - array
            - "null"
        version:
          format: int32
          type: integer
      required:
        - cards
        - version
      type: object
    HealthOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/HealthOutputBody.json
          format: uri
          readOnly: true
          type: string
        status:
          examples:
            - ok
          type: string
      required:
        - status
      type: object
    ListCubeChangesOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/ListCubeChangesOutputBody.json
          format: uri
          readOnly: true
          type: string
        changes:
          items:
            $ref: "#/components/schemas/ChangelogEntry"
          type:
            - array
            - "null"
        total:
          format: int64
          type: integer
      required:
        - changes
        - total
      type: object
    ListCubesOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/ListCubesOutputBody.json
          format: uri
          readOnly: true
          type: string
        cubes:
          items:
            $ref: "#/components/schemas/CubeSummary"
          type:
            - array
            - "null"
        total:
          format: int64
          type: integer
      required:
        - cubes
        - total
      type: object
    LoginInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/LoginInputBody.json
          format: uri
          readOnly: true
          type: string
        email:
          format: email
          type: string
        password:
          minLength: 1
          type: string
      required:
        - email
        - password
      type: object
    RegisterInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/RegisterInputBody.json
          format: uri
          readOnly: true
          type: string
        displayName:
          maxLength: 50
          minLength: 1
          type: string
        email:
          format: email
          maxLength: 254
          type: string
        password:
          maxLength: 200
          minLength: 8
          type: string
      required:
        - email
        - displayName
        - password
      type: object
    ResetPasswordInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/ResetPasswordInputBody.json
          format: uri
          readOnly: true
          type: string
        newPassword:
          maxLength: 200
          minLength: 8
          type: string
        token:
          minLength: 1
          type: string
      required:
        - token
        - newPassword
      type: object
    SearchCardsOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/SearchCardsOutputBody.json
          format: uri
          readOnly: true
          type: string
        cards:
          items:
            $ref: "#/components/schemas/CardDetail"
          type:
            - array
            - "null"
        total:
          format: int64
          type: integer
      required:
        - cards
        - total
      type: object
    UpdateCubeInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/UpdateCubeInputBody.json
          format: uri
          readOnly: true
          type: string
        description:
          maxLength: 2000
          type: string
        name:
          maxLength: 100
          minLength: 1
          type: string
        visibility:
          enum:
            - public
            - private
          type: string
      type: object
    UserBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/UserBody.json
          format: uri
          readOnly: true
          type: string
        displayName:
          type: string
        email:
          type: string
        id:
          type: string
        providers:
          items:
            type: string
          type:
            - array
            - "null"
      required:
        - id
        - email
        - displayName
        - providers
      type: object
    VerifyEmailInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/VerifyEmailInputBody.json
          format: uri
          readOnly: true
          type: string
        token:
          minLength: 1
          type: string
      required:
        - token
      type: object
info:
  title: Cube Planner API
  version: 0.1.0
openapi: 3.1.0
paths:
  /api/auth/forgot-password:
    post:
      operationId: forgot-password
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordInputBody"
        required: true
      responses:
        "204":
          description: No Content
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Request a password reset email
      tags:
        - auth
  /api/auth/login:
    post:
      operationId: login
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInputBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserBody"
          description: OK
          headers:
            Set-Cookie:
              schema:
                type: string
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Log in with email and password
      tags:
        - auth
  /api/auth/logout:
    post:
      operationId: logout
      parameters:
        - in: cookie
          name: cp_session
          schema:
            type: string
      responses:
        "204":
          description: No Content
          headers:
            Set-Cookie:
              schema:
                type: string
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Log out
      tags:
        - auth
  /api/auth/register:
    post:
      operationId: register
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInputBody"
        required: true
      responses:
        "204":
          description: No Content
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Register with email and password
      tags:
        - auth
  /api/auth/reset-password:
    post:
      operationId: reset-password
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordInputBody"
        required: true
      responses:
        "204":
          description: No Content
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Reset password with a token
      tags:
        - auth
  /api/auth/verify-email:
    post:
      operationId: verify-email
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyEmailInputBody"
        required: true
      responses:
        "204":
          description: No Content
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Verify email address with a token
      tags:
        - auth
  /api/cards/autocomplete:
    get:
      description: "Typo-tolerant name search. Oracle-level: one entry per card with a representative printing."
      operationId: autocompleteCards
      parameters:
        - description: Card name, fuzzy
          explode: false
          in: query
          name: q
          required: true
          schema:
            description: Card name, fuzzy
            maxLength: 100
            minLength: 2
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutocompleteCardsOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Card name autocomplete
      tags:
        - cards
  /api/cards/search:
    get:
      operationId: searchCards
      parameters:
        - description: Fuzzy name filter
          explode: false
          in: query
          name: name
          schema:
            description: Fuzzy name filter
            maxLength: 100
            type: string
        - description: Color identity ⊆ selection; C = include colorless-only
          explode: false
          in: query
          name: colors
          schema:
            description: Color identity ⊆ selection; C = include colorless-only
            items:
              enum:
                - W
                - U
                - B
                - R
                - G
                - C
              type: string
            type:
              - array
              - "null"
        - description: Type line substring
          explode: false
          in: query
          name: type
          schema:
            description: Type line substring
            maxLength: 100
            type: string
        - description: Lower CMC bound (0 = none)
          explode: false
          in: query
          name: cmcMin
          schema:
            default: 0
            description: Lower CMC bound (0 = none)
            format: double
            minimum: 0
            type: number
        - description: Upper CMC bound (-1 = none)
          explode: false
          in: query
          name: cmcMax
          schema:
            default: -1
            description: Upper CMC bound (-1 = none)
            format: double
            minimum: -1
            type: number
        - explode: false
          in: query
          name: rarity
          schema:
            enum:
              - common
              - uncommon
              - rare
              - mythic
              - special
              - bonus
            type: string
        - description: Set code
          explode: false
          in: query
          name: set
          schema:
            description: Set code
            maxLength: 10
            type: string
        - explode: false
          in: query
          name: limit
          schema:
            default: 20
            format: int32
            maximum: 100
            minimum: 1
            type: integer
        - explode: false
          in: query
          name: offset
          schema:
            default: 0
            format: int32
            minimum: 0
            type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchCardsOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Search cards with filters
      tags:
        - cards
  /api/cards/{oracleId}/printings:
    get:
      operationId: cardPrintings
      parameters:
        - in: path
          name: oracleId
          required: true
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CardPrintingsOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: All printings of an oracle card, newest first
      tags:
        - cards
  /api/cubes:
    get:
      operationId: listCubes
      parameters:
        - description: Fuzzy name filter (min 2 chars to take effect)
          explode: false
          in: query
          name: q
          schema:
            description: Fuzzy name filter (min 2 chars to take effect)
            maxLength: 100
            type: string
        - explode: false
          in: query
          name: limit
          schema:
            default: 20
            format: int32
            maximum: 100
            minimum: 1
            type: integer
        - explode: false
          in: query
          name: offset
          schema:
            default: 0
            format: int32
            minimum: 0
            type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListCubesOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Browse public cubes
      tags:
        - cubes
    post:
      operationId: createCube
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCubeInputBody"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CubeDetail"
          description: Created
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Create a cube
      tags:
        - cubes
  /api/cubes/{cubeId}:
    delete:
      operationId: deleteCube
      parameters:
        - in: path
          name: cubeId
          required: true
          schema:
            type: string
      responses:
        "204":
          description: No Content
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Delete a cube
      tags:
        - cubes
    get:
      operationId: getCube
      parameters:
        - in: path
          name: cubeId
          required: true
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CubeDetail"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Cube metadata
      tags:
        - cubes
    patch:
      operationId: updateCube
      parameters:
